<!DOCTYPE html>
<html>
<head>
  <title>Chetans Labs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:'Segoe UI',sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(270deg,#0f172a,#1e293b,#020617);
      background-size:600% 600%;
      animation: gradientMove 12s ease infinite;
      color:white;
    }

    @keyframes gradientMove{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    .box{
      backdrop-filter: blur(18px);
      background: rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      padding:45px;
      border-radius:18px;
      text-align:center;
      width:92%;
      max-width:500px;
      box-shadow:0 8px 32px rgba(0,0,0,0.6);
    }

    .logo-img{
      width:90px;
      margin-bottom:12px;
      border-radius:12px;
      padding:6px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      box-shadow:0 0 15px rgba(59,130,246,0.4);
      transition:0.3s;
    }

    .logo-img:hover{
      transform:scale(1.1);
      box-shadow:0 0 25px rgba(59,130,246,0.8);
    }

    .logo{
      font-size:32px;
      font-weight:700;
      background: linear-gradient(90deg,#3b82f6,#60a5fa);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .tagline{
      font-size:14px;
      color:#cbd5f5;
      margin:10px 0 20px;
    }

    a.tool{
      display:block;
      margin:12px 0;
      padding:14px;
      border-radius:12px;
      text-decoration:none;
      font-weight:600;
      color:white;
      background: rgba(59,130,246,0.25);
      border:1px solid rgba(255,255,255,0.15);
      transition:0.3s;
    }

    a.tool:hover{
      transform: translateY(-5px) scale(1.03);
      box-shadow:0 10px 30px rgba(59,130,246,0.7);
    }

  </style>
</head>

<body>

<div class="box">

  <!-- 🔥 YOUR LOGO (EMBEDDED) -->
  <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA..." class="logo-img">

  <div class="logo">Horizon Labs</div>

  <div class="tagline">
    Mathematical Curve Fitting Toolkit using Least Squares
  </div>

  <a class="tool" href="line.html">Straight Line Fit</a>
  <a class="tool" href="quadratic.html">Quadratic Fit</a>
  <a class="tool" href="exponential.html">Exponential Fit</a>

</div>

</body>
</html>
